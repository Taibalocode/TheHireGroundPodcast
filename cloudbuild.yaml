steps:
  # 1. Build the Docker image and inject the secure API key
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-east1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/thehiregroundpodcast/thehiregroundpodcastv1:$COMMIT_SHA'
      - '--build-arg'
      - 'VITE_GEMINI_API_KEY=$_VITE_GEMINI_API_KEY'
      - '.'

  # 2. Push the built image to the Google Cloud registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-east1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/thehiregroundpodcast/thehiregroundpodcastv1:$COMMIT_SHA'

  # 3. Deploy the new image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'thehiregroundpodcastv1'
      - '--image'
      - 'us-east1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/thehiregroundpodcast/thehiregroundpodcastv1:$COMMIT_SHA'
      - '--region'
      - 'us-east1'